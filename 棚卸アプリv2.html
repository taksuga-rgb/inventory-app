<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="棚卸アプリ">
<title>棚卸アプリ</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
    background: #f2f2f7;
    color: #1c1c1e;
    min-height: 100vh;
    padding-bottom: 40px;
  }
  header {
    background: #fff;
    padding: 16px 20px 12px;
    border-bottom: 0.5px solid #c6c6c8;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 { font-size: 20px; font-weight: 600; }
  header p { font-size: 12px; color: #8e8e93; margin-top: 2px; }

  .section {
    background: #fff;
    margin: 16px 16px 0;
    border-radius: 12px;
    overflow: hidden;
    border: 0.5px solid #c6c6c8;
  }
  .section-title {
    font-size: 13px;
    font-weight: 600;
    color: #6e6e73;
    padding: 12px 16px 8px;
    background: #f2f2f7;
    letter-spacing: 0.5px;
  }

  /* カメラ */
  #camera-wrap {
    position: relative;
    background: #000;
    height: 220px;
    overflow: hidden;
  }
  #video {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  #scan-guide {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 10px;
    pointer-events: none;
  }
  .guide-frame {
    width: 240px;
    height: 80px;
    border: 2px solid rgba(48,209,88,0.9);
    border-radius: 6px;
    position: relative;
  }
  .guide-frame::before {
    content: '';
    position: absolute;
    left: 0; right: 0;
    top: 50%;
    height: 1.5px;
    background: rgba(48,209,88,0.7);
    animation: scanLine 1.6s ease-in-out infinite;
  }
  @keyframes scanLine {
    0%   { top: 10%; }
    50%  { top: 88%; }
    100% { top: 10%; }
  }
  #scan-msg {
    color: rgba(255,255,255,0.9);
    font-size: 12px;
    background: rgba(0,0,0,0.55);
    padding: 3px 12px;
    border-radius: 20px;
  }
  #scan-idle {
    position: absolute;
    inset: 0;
    background: #1c1c1e;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #8e8e93;
    font-size: 14px;
  }

  /* ボタン */
  .btn {
    display: block;
    width: calc(100% - 32px);
    margin: 12px 16px;
    padding: 14px;
    border-radius: 10px;
    border: none;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn:active { opacity: 0.75; }
  .btn-primary { background: #007aff; color: #fff; }
  .btn-success { background: #30d158; color: #fff; }
  .btn-gray    { background: #e5e5ea; color: #1c1c1e; }

  /* フォーム */
  .form-row {
    display: flex;
    align-items: center;
    padding: 0 16px;
    border-bottom: 0.5px solid #e5e5ea;
    min-height: 48px;
  }
  .form-row:last-child { border-bottom: none; }
  .form-label { font-size: 15px; width: 80px; flex-shrink: 0; }
  .form-input {
    flex: 1;
    font-size: 15px;
    border: none;
    outline: none;
    background: transparent;
    padding: 12px 0;
    color: #1c1c1e;
  }
  .form-input::placeholder { color: #c7c7cc; }

  /* 個数 */
  .qty-row {
    display: flex;
    align-items: center;
    padding: 8px 16px;
  }
  .qty-label { font-size: 15px; width: 80px; }
  .qty-btn {
    width: 36px; height: 36px;
    border-radius: 18px;
    border: none;
    background: #e5e5ea;
    font-size: 22px;
    font-weight: 300;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: #007aff;
  }
  .qty-btn:active { background: #d1d1d6; }
  #qty-display {
    width: 60px;
    text-align: center;
    font-size: 22px;
    font-weight: 500;
    border: none;
    outline: none;
    background: transparent;
  }

  /* リスト */
  .list-item {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    border-bottom: 0.5px solid #e5e5ea;
    gap: 12px;
  }
  .list-item:last-child { border-bottom: none; }
  .list-name { flex: 1; font-size: 15px; }
  .list-sub { font-size: 12px; color: #8e8e93; margin-top: 2px; }
  .list-qty { font-size: 18px; font-weight: 600; color: #007aff; min-width: 32px; text-align: right; }
  .list-del { background: none; border: none; color: #ff3b30; font-size: 20px; cursor: pointer; padding: 0 4px; }
  .empty-list { padding: 24px 16px; text-align: center; color: #c7c7cc; font-size: 14px; }

  /* トースト */
  #toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: rgba(44,44,46,0.92);
    color: #fff;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 14px;
    transition: transform 0.3s;
    z-index: 999;
    white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  .settings-input {
    flex: 1;
    font-size: 12px;
    border: none;
    outline: none;
    background: transparent;
    padding: 12px 0;
    color: #8e8e93;
    word-break: break-all;
  }
</style>
</head>
<body>

<header>
  <h1>📦 棚卸アプリ</h1>
  <p id="header-status">スキャン待機中</p>
</header>

<p class="section-title" style="margin: 16px 16px 0; background: transparent;">設定</p>
<div class="section">
  <div class="form-row">
    <span class="form-label" style="font-size:13px;">GAS URL</span>
    <input class="settings-input" id="gas-url" type="url" placeholder="デプロイURLを貼り付け" />
  </div>
</div>

<p class="section-title" style="margin: 16px 16px 0; background: transparent;">スキャン</p>
<div class="section">
  <div id="camera-wrap">
    <div id="scan-idle">カメラ停止中</div>
    <video id="video" autoplay playsinline muted style="display:none;"></video>
    <div id="scan-guide" style="display:none;">
      <div class="guide-frame"></div>
      <span id="scan-msg">バーコードを枠内に合わせてください</span>
    </div>
  </div>
  <button class="btn btn-primary" id="scan-btn" onclick="toggleScan()">カメラ起動</button>
</div>

<p class="section-title" style="margin: 16px 16px 0; background: transparent;">入力</p>
<div class="section">
  <div class="form-row">
    <span class="form-label">バーコード</span>
    <input class="form-input" id="barcode" placeholder="スキャンまたは手入力" />
  </div>
  <div class="form-row">
    <span class="form-label">商品名</span>
    <input class="form-input" id="name" placeholder="商品名を入力" />
  </div>
  <div class="qty-row">
    <span class="qty-label">個数</span>
    <button class="qty-btn" onclick="changeQty(-1)">−</button>
    <input id="qty-display" type="number" value="1" min="1" max="9999" />
    <button class="qty-btn" onclick="changeQty(1)">＋</button>
  </div>
  <div class="form-row">
    <span class="form-label">メモ</span>
    <input class="form-input" id="memo" placeholder="任意" />
  </div>
</div>
<button class="btn btn-success" onclick="submitItem()">スプレッドシートに登録</button>

<p class="section-title" style="margin: 16px 16px 0; background: transparent;">今日の登録一覧</p>
<div class="section" id="item-list">
  <p class="empty-list">まだ登録がありません</p>
</div>
<button class="btn btn-gray" onclick="exportCSV()">CSVをダウンロード</button>

<div id="toast"></div>

<script type="module">
import { BarcodeDetector } from 'https://cdn.jsdelivr.net/npm/barcode-detector@2/dist/es/pure.js';

let scanning = false;
let stream = null;
let sessionItems = [];
let detector = null;
let rafId = null;
let lastCode = '';
let lastTime = 0;

// BarcodeDetector初期化
async function initDetector() {
  try {
    detector = new BarcodeDetector({ formats: ['ean_13', 'ean_8', 'upc_a', 'upc_e', 'code_128', 'code_39'] });
  } catch(e) {
    showToast('バーコード検出器の初期化に失敗しました');
  }
}
initDetector();

// GAS URL
const gasUrlInput = document.getElementById('gas-url');
gasUrlInput.value = localStorage.getItem('gasUrl') || '';
gasUrlInput.addEventListener('change', () => {
  localStorage.setItem('gasUrl', gasUrlInput.value.trim());
  showToast('GAS URLを保存しました');
});
function getGasUrl() { return localStorage.getItem('gasUrl') || ''; }

// スキャン
window.toggleScan = function() {
  if (scanning) stopScan();
  else startScan();
}

async function startScan() {
  if (!getGasUrl()) { showToast('先にGAS URLを設定してください'); return; }
  if (!detector) { showToast('バーコード検出器が準備できていません'); return; }
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: 'environment',
        width: { ideal: 1280 },
        height: { ideal: 720 },
        focusMode: 'continuous'
      }
    });
    const video = document.getElementById('video');
    video.srcObject = stream;
    video.style.display = 'block';
    document.getElementById('scan-idle').style.display = 'none';
    document.getElementById('scan-guide').style.display = 'flex';
    document.getElementById('scan-btn').textContent = 'カメラ停止';
    document.getElementById('header-status').textContent = 'スキャン中';
    scanning = true;
    scanLoop();
  } catch(e) {
    showToast('カメラの起動に失敗しました');
  }
}

function stopScan() {
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  const video = document.getElementById('video');
  video.srcObject = null;
  video.style.display = 'none';
  document.getElementById('scan-idle').style.display = 'flex';
  document.getElementById('scan-guide').style.display = 'none';
  document.getElementById('scan-btn').textContent = 'カメラ起動';
  document.getElementById('header-status').textContent = 'スキャン待機中';
  scanning = false;
}

async function scanLoop() {
  if (!scanning) return;
  const video = document.getElementById('video');
  if (video.readyState === video.HAVE_ENOUGH_DATA) {
    try {
      const results = await detector.detect(video);
      if (results.length > 0) {
        const code = results[0].rawValue;
        const now = Date.now();
        // 同じコードを連続読みしないよう2秒のクールダウン
        if (code !== lastCode || now - lastTime > 2000) {
          lastCode = code;
          lastTime = now;
          stopScan();
          document.getElementById('barcode').value = code;
          showToast('読み取り: ' + code);
          lookupBarcode(code);
          return;
        }
      }
    } catch(e) {}
  }
  rafId = requestAnimationFrame(scanLoop);
}

// バーコード検索
async function lookupBarcode(code) {
  const gasUrl = getGasUrl();
  if (!gasUrl) return;
  try {
    const res = await fetch(gasUrl, {
      method: 'POST',
      body: JSON.stringify({ action: 'lookupBarcode', barcode: code })
    });
    const data = await res.json();
    if (data.status === 'found') {
      document.getElementById('name').value = data.name;
      showToast('商品名: ' + data.name);
      document.getElementById('qty-display').focus();
    } else {
      document.getElementById('name').value = '';
      document.getElementById('name').focus();
    }
  } catch(e) {}
}

// 個数
window.changeQty = function(delta) {
  const el = document.getElementById('qty-display');
  el.value = Math.max(1, (parseInt(el.value) || 1) + delta);
}

// 登録
window.submitItem = async function() {
  const gasUrl = getGasUrl();
  if (!gasUrl) { showToast('GAS URLが未設定です'); return; }
  const barcode = document.getElementById('barcode').value.trim();
  const name    = document.getElementById('name').value.trim();
  const qty     = parseInt(document.getElementById('qty-display').value) || 1;
  const memo    = document.getElementById('memo').value.trim();
  if (!barcode) { showToast('バーコードを入力してください'); return; }
  if (!name)    { showToast('商品名を入力してください'); return; }
  showToast('登録中...');
  try {
    const res = await fetch(gasUrl, {
      method: 'POST',
      body: JSON.stringify({ action: 'addRow', barcode, name, quantity: qty, memo })
    });
    const data = await res.json();
    if (data.status === 'ok') {
      sessionItems.push({ barcode, name, qty, memo, time: new Date().toLocaleTimeString('ja-JP') });
      renderList();
      clearForm();
      showToast('✓ 登録しました');
    } else {
      showToast('エラー: ' + data.message);
    }
  } catch(e) {
    showToast('通信エラーが発生しました');
  }
}

function clearForm() {
  document.getElementById('barcode').value = '';
  document.getElementById('name').value = '';
  document.getElementById('qty-display').value = '1';
  document.getElementById('memo').value = '';
}

function renderList() {
  const el = document.getElementById('item-list');
  if (sessionItems.length === 0) {
    el.innerHTML = '<p class="empty-list">まだ登録がありません</p>';
    return;
  }
  el.innerHTML = [...sessionItems].reverse().map((item, i) => `
    <div class="list-item">
      <div style="flex:1">
        <div class="list-name">${item.name}</div>
        <div class="list-sub">${item.barcode} · ${item.time}</div>
      </div>
      <div class="list-qty">${item.qty}</div>
      <button class="list-del" onclick="deleteItem(${sessionItems.length - 1 - i})">×</button>
    </div>
  `).join('');
}

window.deleteItem = function(index) {
  sessionItems.splice(index, 1);
  renderList();
}

window.exportCSV = function() {
  if (sessionItems.length === 0) { showToast('登録データがありません'); return; }
  const header = '日時,バーコード,商品名,個数,メモ\n';
  const rows = sessionItems.map(item => {
    const date = new Date().toLocaleDateString('ja-JP');
    return `${date},${item.barcode},"${item.name}",${item.qty},"${item.memo}"`;
  }).join('\n');
  const blob = new Blob(['\uFEFF' + header + rows], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `棚卸_${new Date().toLocaleDateString('ja-JP').replace(/\//g, '')}.csv`;
  a.click();
  showToast('CSVをダウンロードしました');
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2500);
}
</script>
</body>
</html>
